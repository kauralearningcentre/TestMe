<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catat Pengeluaran</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
    input, select, button { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
    button { background: #4a90e2; color: white; border: none; cursor: pointer; border-radius: 5px; }
  </style>
</head>
<body>
  <h2>Catat Pengeluaran</h2>
  <form id="expenseForm">
    <input type="text" id="barang" placeholder="Nama Barang" required>
    <select id="kategori">
      <option value="Makan">Makan</option>
      <option value="Transport">Transport</option>
      <option value="Hiburan">Hiburan</option>
      <option value="Lainnya">Lainnya</option>
    </select>
    <input type="number" id="jumlah" placeholder="Jumlah (Rp)" required>
    <button type="submit" id="submitBtn">Simpan</button>
  </form>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbz3nmxuSBf0jNYjJPhHuhX53BIvMeBdWLto5eDnn96OorK0QroPKyjo7yiJk5sT9inr/exec";
    
    document.getElementById("expenseForm").addEventListener("submit", function(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      submitBtn.innerText = "Mengirim...";

      // Menggunakan FormData agar kompatibel dengan mode: 'no-cors'
      const formData = new FormData();
      formData.append('barang', document.getElementById("barang").value);
      formData.append('kategori', document.getElementById("kategori").value);
      formData.append('jumlah', document.getElementById("jumlah").value);
      
      // Menggunakan mode: 'no-cors' untuk menghindari blokir CORS
      fetch(URL, { 
        method: "POST", 
        mode: "no-cors",
        body: formData
      })
      .then(() => {
        alert("Data berhasil dikirim!");
        document.getElementById("expenseForm").reset();
      })
      .catch(err => {
        console.error(err);
        alert("Terjadi kesalahan, silakan coba lagi.");
      })
      .finally(() => {
        submitBtn.disabled = false;
        submitBtn.innerText = "Simpan";
      });
    });
  </script>
</body>
</html>
