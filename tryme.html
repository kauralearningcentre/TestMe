<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .modern-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.5); }
    .scroll-hide::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 font-sans text-slate-900">

  <div class="modern-card p-6 rounded-[2rem] shadow-2xl w-full max-w-sm mx-auto border border-white">
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold text-slate-800">Expense Tracker</h2>
    </div>
    
    <div class="bg-indigo-600 p-6 rounded-[1.5rem] mb-6 shadow-xl text-center">
      <label class="block text-indigo-200 text-[10px] font-bold uppercase tracking-[0.2em] mb-2">Remaining Budget</label>
      <div id="sisaBudget" class="text-3xl font-black text-white hidden">Loading...</div>
      <button id="toggleBtn" onclick="toggleBudget()" class="mt-2 bg-indigo-500/50 hover:bg-indigo-500 text-white px-5 py-1.5 rounded-full text-[11px] font-semibold transition-all">Show Budget</button>
    </div>
    
    <form id="expenseForm" class="space-y-3">
      <input type="text" id="barang" placeholder="Description" required class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-100 outline-none shadow-sm">
      <select id="kategori" class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-100 outline-none shadow-sm">
        <option value="Makanan">🍔 Food & Drink</option>
        <option value="Transportasi">🚗 Transport</option>
        <option value="Hiburan">🎮 Entertainment</option>
      </select>
      <input type="number" id="jumlah" placeholder="Amount" required class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-100 outline-none shadow-sm">
      <button type="submit" class="w-full bg-slate-900 text-white font-bold py-3 rounded-2xl">Save Transaction</button>
    </form>

    <div class="mt-8">
      <h3 class="text-sm font-bold text-slate-700 mb-4">My Expenses</h3>
      <div id="expenseList" class="space-y-4"></div>
    </div>
  </div>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbz3nmxuSBf0jNYjJPhHuhX53BIvMeBdWLto5eDnn96OorK0QroPKyjo7yiJk5sT9inr/exec";
    let transactions = [];
    let budgetTotal = 0;

    window.onload = async () => {
      const res = await fetch(URL);
      const data = await res.json();
      budgetTotal = data.budget || 0;
      transactions = data.history || [];
      updateUI();
    };

    function updateUI() {
      const list = document.getElementById('expenseList');
      list.innerHTML = '';
      const today = new Date().toISOString().split('T')[0];
      
      const groups = transactions.reduce((acc, tx) => {
        if (!acc[tx.date]) acc[tx.date] = [];
        acc[tx.date].push(tx);
        return acc;
      }, {});

      Object.keys(groups).sort().reverse().forEach(date => {
        const isToday = date === today;
        const total = groups[date].reduce((sum, t) => sum + t.jumlah, 0);
        
        const div = document.createElement('div');
        div.className = "bg-white p-3 rounded-xl shadow-sm border border-slate-100";
        div.innerHTML = `<div class="flex justify-between font-bold text-xs cursor-pointer" onclick="toggleDetails('${date}')">
          <span>${isToday ? 'Today' : date}</span>
          <span>Rp ${total.toLocaleString()}</span>
        </div>
        <div id="details-${date}" class="${isToday ? '' : 'hidden'} mt-2 space-y-1">
          ${groups[date].map(t => `<div class="flex justify-between text-[10px] text-slate-500"><span>${t.barang}</span><span>${t.jumlah}</span></div>`).join('')}
        </div>`;
        list.appendChild(div);
      });
      document.getElementById('sisaBudget').innerText = new Intl.NumberFormat('id-ID', {style: 'currency', currency: 'IDR'}).format(budgetTotal - transactions.reduce((a, b) => a + b.jumlah, 0));
    }

    document.getElementById("expenseForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const newTx = {
        date: new Date().toISOString().split('T')[0],
        barang: document.getElementById('barang').value,
        jumlah: parseFloat(document.getElementById('jumlah').value)
      };
      await fetch(URL, { method: "POST", body: new URLSearchParams(newTx) });
      transactions.push(newTx);
      updateUI();
      document.getElementById('expenseForm').reset();
    });

    function toggleDetails(date) { document.getElementById(`details-${date}`).classList.toggle('hidden'); }
    function toggleBudget() { document.getElementById('sisaBudget').classList.toggle('hidden'); }
  </script>
</body>
</html>
