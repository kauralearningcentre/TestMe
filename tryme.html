<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>B.W. Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fintech-gradient { background: linear-gradient(135deg, #4F46E5 0%, #3B82F6 100%); }
    .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(241, 245, 249, 1); }
  </style>
</head>
<body class="p-4 md:p-8 font-sans text-slate-800 bg-slate-50">

  <div class="max-w-md mx-auto">
    
    <!-- Header -->
    <div class="mb-6">
      <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" id="currentDateDisplay"></p>
      <div class="flex items-center gap-2">
        <h2 class="text-sm font-bold text-slate-700">Hi, Bharata Wicaksana</h2>
        <span class="text-lg">👋</span>
      </div>
    </div>

    <!-- Allowance Card -->
    <div class="fintech-gradient p-6 rounded-[2rem] shadow-xl shadow-blue-500/20 text-white mb-6">
      <div class="flex justify-between items-center mb-1">
        <p class="text-[10px] uppercase tracking-widest opacity-80 font-bold">Your Allowance</p>
        <button id="eyeBtn" onclick="toggleBalance()" class="opacity-80 hover:opacity-100 transition">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
        </button>
      </div>
      <h1 id="sisaBudget" class="text-3xl font-bold tracking-tight mb-4">*******</h1>
    </div>

    <!-- Transaction Form -->
    <form id="expenseForm" class="glass-card p-6 rounded-[2rem] shadow-lg border border-slate-100 mb-6">
      <input type="text" id="barang" placeholder="What did you buy?" required 
        class="w-full mb-4 px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
      
      <div class="flex flex-col gap-2 mb-4">
        <select id="kategori" class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 outline-none text-sm text-slate-600">
          <option value="Food">🍔 Food & Drink</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Fuel">⛽ Fuel</option>
          <option value="Bills">💡 Bills / Electricity / Credit</option>
          <option value="Shopping">🛒 Monthly Shopping</option>
          <option value="Entertainment">🎮 Entertainment</option>
          <option value="Health">💊 Health</option>
          <option value="Others">📦 Others</option>
        </select>
        <input type="number" id="jumlah" placeholder="Amount" required min="0"
          class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
      </div>
      
      <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition">Save Entry</button>
    </form>

    <!-- Recent Transactions -->
    <div class="mb-4 flex items-center justify-between cursor-pointer" onclick="toggleHistory()">
      <h3 class="font-bold text-slate-800">Recent Transactions</h3>
      <span id="historyToggleText" class="text-[10px] text-indigo-600 font-bold">SHOW</span>
    </div>

    <div id="expenseList" class="space-y-3 hidden">
      <!-- Transactions injected here -->
    </div>
  </div>

  <script>
    const URL = "https://script.google.com/macros/s/AKfycbz3nmxuSBf0jNYjJPhHuhX53BIvMeBdWLto5eDnn96OorK0QroPKyjo7yiJk5sT9inr/exec"; 
    let budgetTotal = 0;
    let transactions = [];
    let isBudgetHidden = true;

    document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('en-US', { 
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
    });

    async function fetchData() {
      try {
        const res = await fetch(URL);
        const data = await res.json();
        budgetTotal = parseFloat(data.budget) || 0;
        transactions = data.history || [];
        renderHistory();
      } catch (err) {
        document.getElementById('sisaBudget').innerText = "Oops!";
      }
    }

    function toggleBalance() {
      const el = document.getElementById('sisaBudget');
      const icon = document.getElementById('eyeIcon');
      isBudgetHidden = !isBudgetHidden;
      
      if (isBudgetHidden) {
        el.innerText = "*******";
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
      } else {
        el.innerText = new Intl.NumberFormat('id-ID', {
          style: 'currency', currency: 'IDR', maximumFractionDigits: 0
        }).format(budgetTotal);
        icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.7 9.7 0 012.33-3.468m4.558 0a9.7 9.7 0 015.424 0M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3l18 18" />`;
      }
    }

    function toggleHistory() {
      const list = document.getElementById('expenseList');
      const toggleText = document.getElementById('historyToggleText');
      list.classList.toggle('hidden');
      toggleText.innerText = list.classList.contains('hidden') ? 'SHOW' : 'HIDE';
    }

    function toggleWeek(id) {
      document.getElementById(id).classList.toggle('hidden');
    }

    function renderHistory() {
      const list = document.getElementById('expenseList');
      list.innerHTML = '';
      
      const grouped = transactions.reduce((acc, tx) => {
        const d = new Date(tx.date);
        const week = Math.ceil(d.getDate() / 7);
        const month = d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
        const key = `${month} - Week ${week}`;
        if (!acc[key]) acc[key] = [];
        acc[key].push(tx);
        return acc;
      }, {});

      Object.keys(grouped).forEach((key, index) => {
        const weekId = `week-${index}`;
        list.innerHTML += `
            <div class="glass-card p-4 rounded-2xl border border-slate-100">
                <div class="flex items-center justify-between cursor-pointer" onclick="toggleWeek('${weekId}')">
                    <p class="text-xs font-bold text-slate-800">${key}</p>
                    <span class="text-[10px] text-slate-400">Tap to see</span>
                </div>
                <div id="${weekId}" class="hidden mt-3 space-y-2">
                    ${grouped[key].reverse().map(t => `
                        <div class="flex items-center justify-between bg-slate-50 p-3 rounded-xl border border-slate-100">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-sm">
                                    ${t.kategori === 'Food' ? '🍔' : t.kategori === 'Transport' ? '🚗' : t.kategori === 'Fuel' ? '⛽' : t.kategori === 'Bills' ? '💡' : t.kategori === 'Shopping' ? '🛒' : t.kategori === 'Entertainment' ? '🎮' : t.kategori === 'Health' ? '💊' : '📦'}
                                </div>
                                <p class="text-xs font-bold text-slate-800">${t.barang}</p>
                            </div>
                            <span class="text-xs font-bold text-slate-800">- ${Number(t.jumlah).toLocaleString('id-ID')}</span>
                        </div>
                    `).join('')}
                </div>
            </div>`;
      });
    }

    document.getElementById("expenseForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submitBtn");
      btn.innerText = "Processing...";
      
      const formData = new URLSearchParams();
      formData.append('barang', document.getElementById('barang').value);
      formData.append('kategori', document.getElementById('kategori').value);
      formData.append('jumlah', document.getElementById('jumlah').value);

      try {
        await fetch(URL, { method: "POST", body: formData });
        document.getElementById('expenseForm').reset();
        await fetchData();
      } catch (err) {
        console.error(err);
      }
      btn.innerText = "Save Entry";
    });

    fetchData();
  </script>
</body>
</html>
