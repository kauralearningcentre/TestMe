<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>B.W. Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; }
    .allowance-card { 
      background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
      position: relative; overflow: hidden;
    }
    .glass { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.7); }
    ::-webkit-scrollbar { display: none; }
    .week-header {
      background: linear-gradient(135deg, #e0e7ff 0%, #f0f4ff 100%);
      border-left: 3px solid #4f46e5;
    }
    .week-total {
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
    }
    .month-header {
      background: linear-gradient(135deg, #c7d2fe 0%, #dbeafe 100%);
      border-left: 4px solid #4f46e5;
    }
    .month-total {
      background: #f0f4ff;
      border-top: 2px solid #4f46e5;
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

  <!-- Setup Modal -->
  <div id="setupModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-white">
    <div class="w-full max-w-sm bg-slate-50 p-6 rounded-3xl shadow-xl">
      <h2 class="text-lg font-bold mb-4">Initial Setup</h2>
      <input type="text" id="inputUrl" placeholder="Enter Script URL" class="w-full mb-3 px-4 py-3 rounded-xl border border-slate-200 text-sm">
      <input type="password" id="inputPin" placeholder="Enter Secret PIN" class="w-full mb-4 px-4 py-3 rounded-xl border border-slate-200 text-sm">
      <button onclick="saveConfig()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Save Settings</button>
    </div>
  </div>

  <div class="w-full max-w-sm mx-auto">
    <div class="mb-6 flex justify-between items-end">
      <div>
        <p id="todayDate" class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1"></p>
        <h1 class="text-2xl font-bold text-slate-900">Hi, Bharata 👋</h1>
      </div>
      <button onclick="resetConfig()" class="text-[10px] text-slate-400 underline">Settings</button>
    </div>
    
    <!-- Allowance Card -->
    <div class="allowance-card p-6 rounded-3xl mb-8 shadow-lg text-white flex justify-between items-center h-28">
      <div>
        <p class="text-[10px] font-semibold uppercase tracking-widest opacity-80 mb-1">YOUR ALLOWANCE</p>
        <h2 id="sisaBudget" class="text-2xl font-black tracking-tight">*******</h2>
      </div>
      <button onclick="toggleBalance()" class="h-10 w-10 flex items-center justify-center rounded-xl bg-white/20 hover:bg-white/30 transition">
        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
      </button>
    </div>
    
    <form id="expenseForm" class="space-y-4">
      <input type="text" id="barang" placeholder="What do you buy?" required class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
      <select id="kategori" class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200 outline-none text-sm text-slate-600 appearance-none">
        <option value="Food">🍔 Food & Drink</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Fuel">⛽ Fuel</option>
        <option value="Bills">💡 Bills / Credit</option>
        <option value="Shopping">🛒 Monthly Shopping</option>
        <option value="Entertainment">🎮 Entertainment</option>
        <option value="Health">💊 Health</option>
        <option value="Others">📦 Others</option>
      </select>
      <input type="text" id="jumlahDisplay" placeholder="Amount (Rp)" required class="w-full px-5 py-3 rounded-2xl bg-white border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
      <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-bold py-3 rounded-2xl shadow-lg hover:bg-slate-800 transition">Save Transaction</button>
    </form>

    <div class="mt-8">
      <h3 class="text-xs font-bold text-slate-500 mb-4 cursor-pointer flex justify-between items-center px-2" onclick="toggleVisibility('expenseList')">
        <span class="uppercase tracking-widest">Recent Transactions</span>
        <svg id="historyIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </h3>
      <div id="expenseList" class="space-y-3 hidden"></div>
    </div>
  </div>

  <script>
    const STORAGE_URL = 'bw_script_url';
    const STORAGE_PIN = 'bw_script_pin';

    function saveConfig() {
      localStorage.setItem(STORAGE_URL, document.getElementById('inputUrl').value);
      localStorage.setItem(STORAGE_PIN, document.getElementById('inputPin').value);
      location.reload();
    }

    function resetConfig() {
      localStorage.clear();
      location.reload();
    }

    function checkConfig() {
      if (!localStorage.getItem(STORAGE_URL)) {
        document.getElementById('setupModal').classList.remove('hidden');
      }
    }

    function toggleVisibility(elementId) {
      const element = document.getElementById(elementId);
      element.classList.toggle('hidden');
      const icon = document.getElementById('historyIcon');
      icon.style.transform = element.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
    }

    function toggleBalance() {
      const budgetEl = document.getElementById('sisaBudget');
      const eyeIcon = document.getElementById('eyeIcon');
      if (budgetEl.innerText.includes('*')) {
        // Already hidden, show it
        fetchData();
        eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 11-5.971-2.93m7.538 5.993l4.243 4.242m-4.243-4.243L9.172 9.172m9.534-2.787a1 1 0 00-1.414-1.414L2.828 15.586a1 1 0 101.414 1.414l15.556-15.556z" />';
      } else {
        budgetEl.innerText = '*******';
        eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
      }
    }

    const amountInput = document.getElementById('jumlahDisplay');
    amountInput.addEventListener('input', function(e) {
      let value = this.value.replace(/[^,\d]/g, '').toString();
      let split = value.split(',');
      let sisa = split[0].length % 3;
      let rupiah = split[0].substr(0, sisa);
      let ribuan = split[0].substr(sisa).match(/\d{3}/gi);
      if (ribuan) {
        let separator = sisa ? '.' : '';
        rupiah += separator + ribuan.join('.');
      }
      this.value = split[1] != undefined ? rupiah + ',' + split[1] : rupiah;
    });

    document.getElementById('todayDate').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
    
    // Helper function to get week number within a month
    function getWeekOfMonth(date) {
      const d = new Date(date);
      const firstDay = new Date(d.getFullYear(), d.getMonth(), 1);
      const firstDayOfWeek = firstDay.getDay();
      const dateOfMonth = d.getDate();
      return Math.ceil((dateOfMonth + firstDayOfWeek) / 7);
    }

    // Helper function to get week start and end dates
    function getWeekDateRange(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const startDate = new Date(d.setDate(diff));
      const endDate = new Date(startDate);
      endDate.setDate(endDate.getDate() + 6);
      return { startDate, endDate };
    }

    // Format date for display
    function formatDateShort(date) {
      return new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // Format month for display
    function formatMonth(date) {
      return new Date(date).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    // Group transactions by Month → Week (Hierarchical Grouping)
    function groupByMonthAndWeek(transactions) {
      const grouped = {};
      
      transactions.forEach(t => {
        const date = new Date(t.date || new Date());
        const year = date.getFullYear();
        const month = date.getMonth();
        const weekOfMonth = getWeekOfMonth(date);
        
        // Month key: YYYY-MM
        const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
        
        // Week key within month: YYYY-MM-W1, YYYY-MM-W2, etc.
        const weekKey = `${monthKey}-W${weekOfMonth}`;
        
        // Initialize month group if not exists
        if (!grouped[monthKey]) {
          grouped[monthKey] = {
            monthKey,
            year,
            month,
            date,
            weeks: {},
            total: 0
          };
        }
        
        // Initialize week group if not exists
        if (!grouped[monthKey].weeks[weekKey]) {
          grouped[monthKey].weeks[weekKey] = {
            weekKey,
            weekOfMonth,
            date,
            transactions: [],
            total: 0
          };
        }
        
        const amount = parseFloat(t.jumlah) || 0;
        grouped[monthKey].weeks[weekKey].transactions.push(t);
        grouped[monthKey].weeks[weekKey].total += amount;
        grouped[monthKey].total += amount;
      });
      
      return grouped;
    }

    async function fetchData() {
      if (!localStorage.getItem(STORAGE_URL)) return;
      try {
        const res = await fetch(localStorage.getItem(STORAGE_URL) + "?pin=" + localStorage.getItem(STORAGE_PIN));
        const data = await res.json();
        renderHistory(data.history || []);
        document.getElementById('sisaBudget').innerText = "Rp " + (parseFloat(data.budget) || 0).toLocaleString('id-ID');
      } catch (err) { console.error(err); }
    }

    document.getElementById("expenseForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.innerText = "Saving...";
      const formData = new URLSearchParams({
        barang: document.getElementById('barang').value,
        kategori: document.getElementById('kategori').value,
        jumlah: document.getElementById('jumlahDisplay').value.replace(/\./g, ''),
        pin: localStorage.getItem(STORAGE_PIN)
      });
      await fetch(localStorage.getItem(STORAGE_URL), { method: "POST", body: formData });
      btn.innerText = "Save Transaction";
      document.getElementById('expenseForm').reset();
      fetchData();
    });

    function renderHistory(transactions) {
      const list = document.getElementById('expenseList');
      
      if (!transactions || transactions.length === 0) {
        list.innerHTML = `<p class="text-center text-slate-400 py-6 text-sm">No recent transactions found.</p>`;
        return;
      }

      // Group transactions by Month → Week (Hierarchical)
      const grouped = groupByMonthAndWeek(transactions);
      
      // Sort months in descending order (newest first)
      const sortedMonths = Object.keys(grouped).sort((a, b) => {
        return b.localeCompare(a);
      });

      // Render each month group with weeks inside
      list.innerHTML = sortedMonths.map(monthKey => {
        const monthGroup = grouped[monthKey];
        const monthLabel = formatMonth(monthGroup.date);
        
        // Sort weeks within month in descending order
        const sortedWeeks = Object.keys(monthGroup.weeks)
          .sort((a, b) => monthGroup.weeks[b].weekOfMonth - monthGroup.weeks[a].weekOfMonth);
        
        // Render each week within the month
        const weeksHtml = sortedWeeks.map(weekKey => {
          const weekGroup = monthGroup.weeks[weekKey];
          const { startDate, endDate } = getWeekDateRange(weekGroup.date);
          const weekLabel = `Week ${weekGroup.weekOfMonth} (${formatDateShort(startDate)} - ${formatDateShort(endDate)})`;

          const transactionsHtml = weekGroup.transactions.map(t => `
            <div class="bg-white px-3 py-2 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center text-xs text-slate-600">
              <div class="flex-1">
                <span class="font-medium text-slate-900">${t.barang}</span>
                <span class="text-slate-400 ml-2">${t.kategori || 'Others'}</span>
              </div>
              <span class="font-semibold text-slate-900">Rp ${(parseFloat(t.jumlah) || 0).toLocaleString('id-ID')}</span>
            </div>
          `).join('');

          return `
            <div class="border border-slate-200 rounded-2xl overflow-hidden mb-3">
              <div class="week-header px-4 py-3">
                <h5 class="font-bold text-sm text-indigo-900">${weekLabel}</h5>
              </div>
              <div class="space-y-2 p-3">
                ${transactionsHtml}
              </div>
              <div class="week-total px-4 py-3 flex justify-between items-center">
                <span class="text-xs font-semibold text-slate-600">WEEK TOTAL</span>
                <span class="font-bold text-sm text-indigo-600">Rp ${weekGroup.total.toLocaleString('id-ID')}</span>
              </div>
            </div>
          `;
        }).join('');

        return `
          <div class="mb-6 border border-indigo-300 rounded-3xl overflow-hidden shadow-md">
            <div class="month-header px-4 py-4">
              <h4 class="font-bold text-base text-indigo-950">📅 ${monthLabel}</h4>
            </div>
            <div class="p-4 space-y-3">
              ${weeksHtml}
            </div>
            <div class="month-total px-4 py-4 flex justify-between items-center">
              <span class="text-sm font-bold text-slate-700">MONTH TOTAL</span>
              <span class="font-bold text-lg text-indigo-700">Rp ${monthGroup.total.toLocaleString('id-ID')}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    checkConfig();
    fetchData();
  </script>
</body>
</html>
