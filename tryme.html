<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>B.W. Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1e293b; }
    .allowance-card { 
      background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
      position: relative; overflow: hidden;
    }
    .glass { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.7); }
    ::-webkit-scrollbar { display: none; }
    .modal-backdrop {
      backdrop-filter: blur(5px);
    }
    .receipt-item {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 0.375rem 0;
      border-bottom: 1px dotted #e2e8f0;
      font-size: 0.8rem;
      gap: 0.5rem;
    }
    .receipt-item:last-child {
      border-bottom: 2px solid #1e293b;
    }
    .receipt-item div:first-child {
      flex: 1;
      min-width: 0;
    }
    .receipt-item div:last-child {
      flex-shrink: 0;
      text-align: right;
      white-space: nowrap;
    }
    .receipt-total {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      font-weight: bold;
      font-size: 0.85rem;
      gap: 0.5rem;
    }
    .session-timer {
      font-size: 0.75rem;
      color: #f97316;
      font-weight: 600;
    }
    .eye-icon-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center bg-gray-50">

  <!-- Login Modal -->
  <div id="loginModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop">
    <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-2xl">
      <h2 class="text-2xl font-bold mb-2 text-slate-900">Welcome Back</h2>
      <p class="text-sm text-slate-500 mb-6">Enter your credentials to access the tracker</p>
      <div id="loginError" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>
      <input type="text" id="loginUrl" placeholder="Script URL" class="w-full mb-3 px-4 py-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
      <input type="password" id="loginPin" placeholder="Secret PIN" class="w-full mb-6 px-4 py-3 rounded-xl border border-slate-200 text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
      <button onclick="handleLogin()" id="loginBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Login</button>
    </div>
  </div>

  <!-- Session Timeout Warning Modal -->
  <div id="timeoutWarningModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop">
    <div class="w-full max-w-sm bg-white p-8 rounded-3xl shadow-2xl">
      <h2 class="text-xl font-bold mb-2 text-amber-900">⏰ Session Expiring Soon</h2>
      <p class="text-sm text-slate-600 mb-6">Your session will expire in <span id="warningCountdown" class="font-bold text-orange-600">2 minutes</span>. Click below to stay logged in.</p>
      <button onclick="extendSession()" class="w-full bg-amber-500 text-white py-3 rounded-xl font-bold hover:bg-amber-600 transition mb-2">Stay Logged In</button>
      <button onclick="handleLogout()" class="w-full bg-slate-200 text-slate-900 py-3 rounded-xl font-bold hover:bg-slate-300 transition">Logout Now</button>
    </div>
  </div>

  <div class="w-full max-w-sm mx-auto">
    <div class="mb-6 flex justify-between items-end">
      <div>
        <p id="todayDate" class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-1"></p>
        <h1 class="text-2xl font-bold text-slate-900">Hi, Bharata 👋</h1>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-right">
          <p id="sessionTimer" class="session-timer hidden">Session: --:--</p>
        </div>
        <button onclick="handleLogout()" class="text-[10px] text-slate-400 hover:text-red-500 underline">Logout</button>
      </div>
    </div>
    
    <!-- Allowance Card -->
    <div class="allowance-card p-6 rounded-3xl mb-8 shadow-lg text-white flex justify-between items-center h-28">
      <div>
        <p class="text-[10px] font-semibold uppercase tracking-widest opacity-80 mb-1">YOUR ALLOWANCE</p>
        <h2 id="sisaBudget" class="text-2xl font-black tracking-tight">*******</h2>
      </div>
      <button onclick="toggleBalance()" class="h-10 w-10 flex items-center justify-center rounded-xl bg-white/20 hover:bg-white/30 transition flex-shrink-0">
        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
        </svg>
      </button>
    </div>
    
    <form id="expenseForm" class="space-y-4 bg-white p-6 rounded-2xl shadow">
      <input type="text" id="barang" placeholder="What do you buy?" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
      <select id="kategori" class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-200 outline-none text-sm text-slate-600 appearance-none">
        <option value="Food">🍔 Food & Drink</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Fuel">⛽ Fuel</option>
        <option value="Bills">💡 Bills / Credit</option>
        <option value="Shopping">🛒 Monthly Shopping</option>
        <option value="Entertainment">🎮 Entertainment</option>
        <option value="Health">💊 Health</option>
        <option value="Others">📦 Others</option>
      </select>
      <input type="text" id="jumlahDisplay" placeholder="Amount (Rp)" required class="w-full px-5 py-3 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
      <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-bold py-3 rounded-2xl shadow-lg hover:bg-slate-800 transition">Save Transaction</button>
    </form>

    <div class="mt-8">
      <h3 class="text-xs font-bold text-slate-500 mb-3 cursor-pointer flex justify-between items-center px-2" onclick="toggleVisibility('expenseList')">
        <span class="uppercase tracking-widest">📋 Recent Transactions</span>
        <svg id="historyIcon" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </h3>
      <div id="expenseList" class="space-y-3 hidden"></div>
    </div>
  </div>

  <script>
    // ===== SESSION & LOGIN MANAGEMENT =====
    const STORAGE_URL = 'bw_script_url';
    const STORAGE_PIN = 'bw_script_pin';
    const STORAGE_LOGIN_TIME = 'bw_login_time';
    const SESSION_DURATION = 30 * 60 * 1000; // 30 minutes
    const WARNING_TIME = 2 * 60 * 1000; // Show warning 2 minutes before timeout

    let sessionTimer = null;
    let warningTimer = null;
    let isLoggedIn = false;
    let balanceVisible = false; // Track if budget is visible

    function formatTime(ms) {
      const minutes = Math.floor(ms / 60000);
      const seconds = Math.floor((ms % 60000) / 1000);
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function getTimeRemaining() {
      const loginTime = parseInt(localStorage.getItem(STORAGE_LOGIN_TIME)) || 0;
      const now = Date.now();
      const timeRemaining = SESSION_DURATION - (now - loginTime);
      return Math.max(0, timeRemaining);
    }

    function isSessionValid() {
      const loginTime = parseInt(localStorage.getItem(STORAGE_LOGIN_TIME)) || 0;
      if (!loginTime) return false;
      const timeRemaining = getTimeRemaining();
      return timeRemaining > 0;
    }

    function updateSessionTimer() {
      const timeRemaining = getTimeRemaining();
      const timerEl = document.getElementById('sessionTimer');
      
      if (timeRemaining <= 0) {
        handleSessionTimeout();
        return;
      }

      timerEl.textContent = `Session: ${formatTime(timeRemaining)}`;
    }

    function startSessionTimer() {
      if (sessionTimer) clearInterval(sessionTimer);
      
      // Update timer every second
      sessionTimer = setInterval(() => {
        updateSessionTimer();
      }, 1000);
      
      // Show warning 2 minutes before timeout
      if (warningTimer) clearTimeout(warningTimer);
      const timeRemaining = getTimeRemaining();
      const timeUntilWarning = timeRemaining - WARNING_TIME;
      
      if (timeUntilWarning > 0) {
        warningTimer = setTimeout(() => {
          showTimeoutWarning();
        }, timeUntilWarning);
      } else if (timeRemaining > 0) {
        showTimeoutWarning();
      }
    }

    function showTimeoutWarning() {
      document.getElementById('timeoutWarningModal').classList.remove('hidden');
      let countdownValue = 120; // 2 minutes
      const countdownEl = document.getElementById('warningCountdown');
      
      const warningInterval = setInterval(() => {
        countdownValue--;
        if (countdownValue <= 0) {
          clearInterval(warningInterval);
          handleSessionTimeout();
        } else {
          const mins = Math.floor(countdownValue / 60);
          const secs = countdownValue % 60;
          countdownEl.textContent = `${mins}:${String(secs).padStart(2, '0')}`;
        }
      }, 1000);
    }

    function extendSession() {
      localStorage.setItem(STORAGE_LOGIN_TIME, Date.now().toString());
      document.getElementById('timeoutWarningModal').classList.add('hidden');
      startSessionTimer();
    }

    function handleSessionTimeout() {
      showLoginModal('Session expired! Please login again.');
      clearAllTimers();
      handleLogout();
    }

    function clearAllTimers() {
      if (sessionTimer) clearInterval(sessionTimer);
      if (warningTimer) clearTimeout(warningTimer);
    }

    async function handleLogin() {
      const url = document.getElementById('loginUrl').value.trim();
      const pin = document.getElementById('loginPin').value.trim();
      const loginBtn = document.getElementById('loginBtn');
      const errorEl = document.getElementById('loginError');

      if (!url || !pin) {
        errorEl.textContent = 'Please enter both URL and PIN';
        errorEl.classList.remove('hidden');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Verifying...';
      errorEl.classList.add('hidden');

      try {
        // Test connection with provided credentials
        const res = await fetch(url + "?pin=" + pin);
        if (!res.ok) {
          throw new Error('Invalid credentials or URL');
        }
        const data = await res.json();
        
        // Save credentials
        localStorage.setItem(STORAGE_URL, url);
        localStorage.setItem(STORAGE_PIN, pin);
        localStorage.setItem(STORAGE_LOGIN_TIME, Date.now().toString());
        
        isLoggedIn = true;
        balanceVisible = false; // Reset balance visibility on login
        document.getElementById('loginModal').classList.add('hidden');
        document.getElementById('sessionTimer').classList.remove('hidden');
        startSessionTimer();
        fetchData();
      } catch (err) {
        errorEl.textContent = 'Login failed: ' + err.message;
        errorEl.classList.remove('hidden');
        console.error(err);
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    }

    function handleLogout() {
      clearAllTimers();
      localStorage.removeItem(STORAGE_LOGIN_TIME);
      isLoggedIn = false;
      balanceVisible = false;
      document.getElementById('sessionTimer').classList.add('hidden');
      document.getElementById('timeoutWarningModal').classList.add('hidden');
      showLoginModal();
    }

    function showLoginModal(message = '') {
      const modal = document.getElementById('loginModal');
      const errorEl = document.getElementById('loginError');
      
      document.getElementById('loginUrl').value = localStorage.getItem(STORAGE_URL) || '';
      document.getElementById('loginPin').value = '';
      
      if (message) {
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
      } else {
        errorEl.classList.add('hidden');
      }
      
      modal.classList.remove('hidden');
    }

    function checkLogin() {
      if (!localStorage.getItem(STORAGE_URL) || !isSessionValid()) {
        isLoggedIn = false;
        balanceVisible = false;
        document.getElementById('sessionTimer').classList.add('hidden');
        showLoginModal();
      } else {
        isLoggedIn = true;
        document.getElementById('sessionTimer').classList.remove('hidden');
        startSessionTimer();
      }
    }

    // ===== TRACKER FUNCTIONALITY =====

    function toggleVisibility(elementId) {
      const element = document.getElementById(elementId);
      element.classList.toggle('hidden');
      const icon = document.getElementById('historyIcon');
      icon.style.transform = element.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
    }

    function toggleBalance() {
      const budgetEl = document.getElementById('sisaBudget');
      const eyeIcon = document.getElementById('eyeIcon');
      
      if (balanceVisible) {
        // Hide it
        budgetEl.innerText = '*******';
        eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>';
        balanceVisible = false;
      } else {
        // Show it
        fetchData();
        eyeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 11-5.971-2.93m7.538 5.993l4.243 4.242m-4.243-4.243L9.172 9.172m9.534-2.787a1 1 0 00-1.414-1.414L2.828 15.586a1 1 0 101.414 1.414l15.556-15.556z"></path>';
        balanceVisible = true;
      }
    }

    const amountInput = document.getElementById('jumlahDisplay');
    amountInput.addEventListener('input', function(e) {
      let value = this.value.replace(/[^,\d]/g, '').toString();
      let split = value.split(',');
      let sisa = split[0].length % 3;
      let rupiah = split[0].substr(0, sisa);
      let ribuan = split[0].substr(sisa).match(/\d{3}/gi);
      if (ribuan) {
        let separator = sisa ? '.' : '';
        rupiah += separator + ribuan.join('.');
      }
      this.value = split[1] != undefined ? rupiah + ',' + split[1] : rupiah;
    });

    document.getElementById('todayDate').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }).toUpperCase();
    
    // Helper function to get week number within a month
    function getWeekOfMonth(date) {
      const d = new Date(date);
      const firstDay = new Date(d.getFullYear(), d.getMonth(), 1);
      const firstDayOfWeek = firstDay.getDay();
      const dateOfMonth = d.getDate();
      return Math.ceil((dateOfMonth + firstDayOfWeek) / 7);
    }

    // Helper function to get week start and end dates
    function getWeekDateRange(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      const startDate = new Date(d.setDate(diff));
      const endDate = new Date(startDate);
      endDate.setDate(endDate.getDate() + 6);
      return { startDate, endDate };
    }

    // Format date for display
    function formatDateShort(date) {
      return new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // Format month for display
    function formatMonth(date) {
      return new Date(date).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    // Group transactions by Month → Week (Hierarchical Grouping)
    function groupByMonthAndWeek(transactions) {
      const grouped = {};
      
      transactions.forEach(t => {
        const date = new Date(t.date || new Date());
        const year = date.getFullYear();
        const month = date.getMonth();
        const weekOfMonth = getWeekOfMonth(date);
        
        // Month key: YYYY-MM
        const monthKey = `${year}-${String(month + 1).padStart(2, '0')}`;
        
        // Week key within month: YYYY-MM-W1, YYYY-MM-W2, etc.
        const weekKey = `${monthKey}-W${weekOfMonth}`;
        
        // Initialize month group if not exists
        if (!grouped[monthKey]) {
          grouped[monthKey] = {
            monthKey,
            year,
            month,
            date,
            weeks: {},
            total: 0
          };
        }
        
        // Initialize week group if not exists
        if (!grouped[monthKey].weeks[weekKey]) {
          grouped[monthKey].weeks[weekKey] = {
            weekKey,
            weekOfMonth,
            date,
            transactions: [],
            total: 0
          };
        }
        
        const amount = parseFloat(t.jumlah) || 0;
        grouped[monthKey].weeks[weekKey].transactions.push(t);
        grouped[monthKey].weeks[weekKey].total += amount;
        grouped[monthKey].total += amount;
      });
      
      return grouped;
    }

    async function fetchData() {
      if (!localStorage.getItem(STORAGE_URL)) return;
      try {
        const res = await fetch(localStorage.getItem(STORAGE_URL) + "?pin=" + localStorage.getItem(STORAGE_PIN));
        const data = await res.json();
        renderHistory(data.history || []);
        if (balanceVisible) {
          document.getElementById('sisaBudget').innerText = "Rp " + (parseFloat(data.budget) || 0).toLocaleString('id-ID');
        }
      } catch (err) { console.error(err); }
    }

    document.getElementById("expenseForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      // Check session validity
      if (!isSessionValid()) {
        handleSessionTimeout();
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.innerText = "Saving...";
      const formData = new URLSearchParams({
        barang: document.getElementById('barang').value,
        kategori: document.getElementById('kategori').value,
        jumlah: document.getElementById('jumlahDisplay').value.replace(/\./g, ''),
        pin: localStorage.getItem(STORAGE_PIN)
      });
      
      try {
        await fetch(localStorage.getItem(STORAGE_URL), { method: "POST", body: formData });
        btn.innerText = "Save Transaction";
        document.getElementById('expenseForm').reset();
        fetchData();
      } catch (err) {
        console.error(err);
        btn.innerText = "Error! Try again";
        setTimeout(() => { btn.innerText = "Save Transaction"; }, 2000);
      }
    });

    function renderHistory(transactions) {
      const list = document.getElementById('expenseList');
      
      if (!transactions || transactions.length === 0) {
        list.innerHTML = `<p class="text-center text-slate-400 py-6 text-sm">No recent transactions found.</p>`;
        return;
      }

      // Group transactions by Month → Week (Hierarchical)
      const grouped = groupByMonthAndWeek(transactions);
      
      // Sort months in descending order (newest first)
      const sortedMonths = Object.keys(grouped).sort((a, b) => {
        return b.localeCompare(a);
      });

      // Render each month group with weeks inside - RECEIPT STYLE
      list.innerHTML = sortedMonths.map(monthKey => {
        const monthGroup = grouped[monthKey];
        const monthLabel = formatMonth(monthGroup.date);
        
        // Sort weeks within month in descending order
        const sortedWeeks = Object.keys(monthGroup.weeks)
          .sort((a, b) => monthGroup.weeks[b].weekOfMonth - monthGroup.weeks[a].weekOfMonth);
        
        // Render each week within the month
        const weeksHtml = sortedWeeks.map(weekKey => {
          const weekGroup = monthGroup.weeks[weekKey];
          const { startDate, endDate } = getWeekDateRange(weekGroup.date);
          const weekLabel = `Week ${weekGroup.weekOfMonth} • ${formatDateShort(startDate)} - ${formatDateShort(endDate)}`;

          const transactionsHtml = weekGroup.transactions.map(t => {
            const amount = parseFloat(t.jumlah) || 0;
            const category = t.kategori || 'Others';
            return `
              <div class="receipt-item">
                <div>
                  <div class="font-medium text-slate-800 text-[0.8rem]">${t.barang}</div>
                  <div class="text-slate-500 text-[0.7rem] leading-tight">${category}</div>
                </div>
                <div class="font-semibold text-slate-900 text-[0.8rem]">Rp ${amount.toLocaleString('id-ID')}</div>
              </div>
            `;
          }).join('');

          return `
            <div class="bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
              <div class="text-[0.7rem] font-bold text-slate-600 mb-2 pb-2 border-b border-dashed border-slate-300">
                ${weekLabel}
              </div>
              <div>
                ${transactionsHtml}
                <div class="receipt-total mt-2 pt-2 text-[0.75rem]">
                  <span class="font-semibold">WEEK TOTAL</span>
                  <span class="font-bold">Rp ${weekGroup.total.toLocaleString('id-ID')}</span>
                </div>
              </div>
            </div>
          `;
        }).join('');

        return `
          <div class="bg-white p-3 rounded-lg border border-indigo-300 shadow-sm">
            <div class="text-center mb-3 pb-2 border-b border-dashed border-indigo-200">
              <div class="text-[0.75rem] font-bold text-slate-600">📋 ${monthLabel}</div>
            </div>
            <div class="space-y-2">
              ${weeksHtml}
            </div>
            <div class="mt-3 pt-2 border-t border-slate-900 text-center">
              <div class="text-[0.8rem] font-bold text-indigo-700">
                MONTH TOTAL: Rp ${monthGroup.total.toLocaleString('id-ID')}
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Initialize
    checkLogin();
  </script>
</body>
</html>
